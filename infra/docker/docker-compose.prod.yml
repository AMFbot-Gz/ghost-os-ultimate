# docker-compose.prod.yml — Stack Ghost OS Ultimate Production
version: "3.9"

x-common: &common
  restart: unless-stopped
  networks:
    - ghost_net
  env_file: ../../.env

services:
  # ── API Node.js Queen ──────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: ghost_api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      STANDALONE_MODE: "true"
      GHOST_OS_MODE: cloud
    depends_on:
      agent:
        condition: service_healthy
    <<: *common
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Python Layers (:8001-:8007) ────────────────────────────────────────
  agent:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.agent
    container_name: ghost_agent
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
      - "8005:8005"
      - "8006:8006"
      - "8007:8007"
    volumes:
      - agent_memory:/app/agent/memory
      - agent_skills:/app/skills
    <<: *common
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 5

  # ── Ollama (LLM local) ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ghost_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    <<: *common
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ── Dashboard (React/Vite en dev, Nginx en prod) ───────────────────────
  dashboard:
    image: nginx:alpine
    container_name: ghost_dashboard
    ports:
      - "${HUD_PORT:-9001}:80"
    volumes:
      - ../../interfaces/dashboard/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    <<: *common

volumes:
  agent_memory:
  agent_skills:
  ollama_models:

networks:
  ghost_net:
    driver: bridge
