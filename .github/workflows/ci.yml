name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Tests Node.js ──────────────────────────────────────────────────────────
  test-node:
    name: Tests Jest (Node.js)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          CHIMERA_SECRET: ci-test-secret-not-for-production
          NODE_ENV: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-results-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  # ─── Tests Python ────────────────────────────────────────────────────────────
  test-python:
    name: Tests Pytest (Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime dependencies (minimal — sans torch)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-runtime.txt

      - name: Run pytest
        run: python -m pytest tests/pytest/ -v --tb=short --timeout=30
        env:
          CHIMERA_SECRET: ci-test-secret-not-for-production
          OLLAMA_HOST: http://localhost:11434
          STANDALONE_MODE: "true"

  # ─── Lint & sécurité ─────────────────────────────────────────────────────────
  lint:
    name: Lint & sécurité
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit npm deps
        run: npm audit --audit-level=high
        continue-on-error: true  # Info seulement — ne bloque pas le CI pour l'instant

      - name: Check for hardcoded secrets
        run: |
          # Vérifie qu'aucune valeur de secret par défaut n'est commitée
          if grep -rn "pico-ruche-dev-secret" --include="*.js" --include="*.py" --include="*.yml" \
              --exclude-dir=".git" --exclude-dir="node_modules" .; then
            echo "⚠️  Secret par défaut trouvé dans le code source"
            exit 1
          fi
          echo "✅ Aucun secret par défaut détecté"

  # ─── Build Docker ─────────────────────────────────────────────────────────────
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test-node, test-python]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f runtime/deployment/docker/Dockerfile -t ghost-os-ultimate:ci .

      - name: Smoke test container
        run: |
          docker run --rm --name ghost-test -d \
            -e STANDALONE_MODE=true \
            -e CHIMERA_SECRET=ci-test-secret \
            ghost-os-ultimate:ci
          sleep 5
          docker logs ghost-test 2>&1 | head -20
          docker stop ghost-test || true
