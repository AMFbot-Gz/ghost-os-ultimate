<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; overflow: hidden; pointer-events: none; font-family: -apple-system, sans-serif; }

.highlight-box {
  position: absolute;
  border: 2px solid rgba(99, 102, 241, 0.8);
  background: rgba(99, 102, 241, 0.1);
  border-radius: 4px;
  transition: all 0.15s ease;
  pointer-events: none;
}

.highlight-box.pending {
  border-color: rgba(245, 158, 11, 0.9);
  background: rgba(245, 158, 11, 0.1);
  animation: pulse 1s infinite;
}

.highlight-box.success { border-color: rgba(16, 185, 129, 0.9); background: rgba(16, 185, 129, 0.15); }
.highlight-box.error   { border-color: rgba(239, 68, 68, 0.9);  background: rgba(239, 68, 68, 0.15); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.5; }
}

.label {
  position: absolute;
  top: -20px;
  left: 0;
  font-size: 11px;
  color: rgba(255,255,255,0.9);
  background: rgba(0,0,0,0.6);
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
}

.heatmap-dot {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(circle, rgba(255,100,0,0.6) 0%, transparent 70%);
}

#status-bar {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,0,0,0.75);
  color: #fff;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  border: 1px solid rgba(255,255,255,0.15);
}
</style>
</head>
<body>
<div id="overlay"></div>
<div id="status-bar" style="display:none"></div>
<script>
const overlay = document.getElementById('overlay');
const statusBar = document.getElementById('status-bar');
const heatmap = new Map(); // "x,y" → count

function showHighlight({ x, y, width = 120, height = 40, label = '', state = 'pending' }) {
  const el = document.createElement('div');
  el.className = `highlight-box ${state}`;
  el.style.cssText = `left:${x}px;top:${y}px;width:${width}px;height:${height}px`;
  if (label) { const l = document.createElement('div'); l.className = 'label'; l.textContent = label; el.appendChild(l); }
  overlay.appendChild(el);
  return el;
}

function flashResult(el, success) {
  el.className = `highlight-box ${success ? 'success' : 'error'}`;
  setTimeout(() => el.remove(), 500);
}

function addHeatmapDot(x, y) {
  const key = `${Math.round(x/20)*20},${Math.round(y/20)*20}`;
  const count = (heatmap.get(key) || 0) + 1;
  heatmap.set(key, count);
  const size = Math.min(60, 20 + count * 8);
  const el = document.createElement('div');
  el.className = 'heatmap-dot';
  el.style.cssText = `left:${x-size/2}px;top:${y-size/2}px;width:${size}px;height:${size}px;opacity:${Math.min(0.8, 0.2 + count*0.1)}`;
  overlay.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function showStatus(msg) {
  statusBar.textContent = msg;
  statusBar.style.display = 'block';
  setTimeout(() => { statusBar.style.display = 'none'; }, 3000);
}

// IPC depuis main process
window.addEventListener('message', ({ data }) => {
  if (!data?.type) return;
  switch (data.type) {
    case 'highlight': {
      const el = showHighlight(data);
      if (data.autoFlash) setTimeout(() => flashResult(el, data.success !== false), data.duration || 800);
      break;
    }
    case 'heatmap': addHeatmapDot(data.x, data.y); break;
    case 'status': showStatus(data.message); break;
    case 'clear': overlay.innerHTML = ''; break;
  }
});
</script>
</body>
</html>
