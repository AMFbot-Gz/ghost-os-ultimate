swarm:
  enabled: false  # activer si plusieurs machines disponibles
  healthCheckIntervalMs: 30000
  selectionStrategy: least_loaded  # round_robin | least_loaded | latency_aware
  nodes:
    - id: mac-local
      url: http://localhost:11434
      models: [llama3:latest, llama3.2:3b, llava:7b, moondream:latest]
      role: primary
      maxConcurrency: 3
