# Ghost OS Ultimate — Configuration centrale
# Fusion LaRuche v5.0 + PICO-RUCHE + nouveaux composants
version: "1.0.0"
codename: "GHOST OS ULTIMATE"

hardware:
  target: "Intel Core i7-9750H 16GB"   # Machine de Wiaam — s'adapte automatiquement

# ─── Cœur de conscience ────────────────────────────────────────────────────────
core:
  consciousness:
    enabled: true
    loop_interval_sec: 30
    learning_mode: continuous          # continuous | paused | offline
    max_consecutive_errors: 5

  memory:
    max_episodes: 10000
    episode_file: "agent/memory/episodes.jsonl"
    persistent_file: "agent/memory/persistent.md"
    world_state_file: "agent/memory/world_state.json"
    compress_at: 0.9                   # Compresse à 90% de capacité
    vector_dims: 64                    # Dimensions du vecteur bag-of-words

  perception:
    interval_seconds: 30
    screenshot_enabled: true
    system_scan_enabled: true
    change_threshold: 0.05
    modalities:
      - visual
      - system
      # - audio                        # Désactivé par défaut (ressources)
      # - network

# ─── Ports des couches Python ─────────────────────────────────────────────────
ports:
  # Couches fondamentales (Phases 1-7)
  queen: 8001
  perception: 8002
  brain: 8003
  executor: 8004
  evolution: 8005
  memory: 8006
  mcp_bridge: 8007
  # Couches avancées (Phases 10-15)
  planner: 8008
  learner: 8009
  goals: 8010
  pipeline: 8011
  miner: 8012
  # Production Shell (Phases 16-19)
  swarm_router: 8013
  validator: 8014
  computer_use: 8015
  consciousness_bridge: 8016
  optimizer: 8017
  # Node.js + Frontend
  node_queen: 3000
  hud: 9001
  dashboard: 5173

# ─── Modèles LLM ─────────────────────────────────────────────────────────────
ollama:
  base_url: "http://localhost:11434"
  keep_alive: -1                        # Garde les modèles en RAM
  models:
    strategist: "llama3:latest"         # Planification haute qualité
    worker: "llama3.2:3b"              # Tâches rapides
    vision: "moondream:latest"          # Vision légère
    coder: "llama3.2:3b"               # Génération de code
    compressor: "llama3.2:3b"          # Compression contexte
  timeout: 120

# Modèles cloud (fallback optionnel)
cloud_llm:
  claude:
    enabled: true
    model: "claude-opus-4-6"
    strategist_only: true               # Utilisé uniquement pour planification haute valeur
  kimi:
    enabled: false
    model: "moonshot-v1-8k"
  openai:
    enabled: false
    model: "gpt-4o"

# ─── Modes d'exécution ───────────────────────────────────────────────────────
runtime:
  default_mode: "ultimate"
  auto_switch: true                     # Bascule en lite si RAM < 4GB
  modes:
    ultimate:
      memory: "unlimited"
      cpu: "maximum"
      parallel_missions: 5
      consciousness: true
      swarm: true
    lite:
      memory: "500MB"
      cpu: 2
      parallel_missions: 1
      consciousness: false
      swarm: false
    cloud:
      parallel_missions: 10
      consciousness: true
      swarm: true

# ─── Brain (planification) ───────────────────────────────────────────────────
brain:
  max_context_tokens: 8000
  compress_threshold: 6000
  max_subtasks: 5
  risk_levels: [low, medium, high]
  auto_act_on: [low, medium, high]
  hitl_required_on: []

# ─── Sécurité ─────────────────────────────────────────────────────────────────
security:
  hitl_mode: "autonomous"
  max_shell_timeout: 30
  output_max_chars: 10000
  blocked_shell_patterns:
    - "rm -rf /"
    - ":(){ :|:& };:"
    - "dd if=/dev/zero"
    - "mkfs"
    - "shutdown"
    - "reboot"
  require_confirmation_for:
    - delete
    - format
    - kill
    - shutdown

# ─── Telegram HITL ───────────────────────────────────────────────────────────
telegram:
  enabled: true
  hitl_timeout_seconds: 120
  commands:
    - /status   → état de l'essaim
    - /mission  → lancer une mission
    - /stop     → arrêter une mission

# ─── MCP Bridge ──────────────────────────────────────────────────────────────
mcp:
  node_base_url: "http://localhost:3000"
  timeout: 30
  tools:
    - { name: "os-control",    endpoint: "/mcp/os-control" }
    - { name: "terminal",      endpoint: "/mcp/terminal" }
    - { name: "vision",        endpoint: "/mcp/vision" }
    - { name: "vault",         endpoint: "/mcp/vault" }
    - { name: "rollback",      endpoint: "/mcp/rollback" }
    - { name: "skill-factory", endpoint: "/mcp/skill-factory" }
    - { name: "janitor",       endpoint: "/mcp/janitor" }

# ─── Marketplace ─────────────────────────────────────────────────────────────
marketplace:
  local_registry: "skills/registry.json"
  auto_update_check: 3600              # Vérifie les mises à jour toutes les heures
  validation:
    require_manifest: true
    require_skill_js: true
    name_pattern: "^[a-z0-9_]+$"

# ─── Monitoring ──────────────────────────────────────────────────────────────
monitoring:
  metrics_collection: true
  performance_profiling: false         # Activé en mode debug
  alert_thresholds:
    error_rate: 0.05
    latency_ms: 3000
    memory_usage: 0.8
    cpu_usage: 0.9

# ─── MLX (Apple Silicon optionnel) ──────────────────────────────────────────
mlx:
  enabled: false
  model_path: "./mlx-models/qwen3-7b"
  server_url: "http://127.0.0.1:8080/v1"
  fallback_to_ollama: true

# ─── Validator — Confidence Score (Phase 17+) ────────────────────────────────
validator:
  exec_timeout_s: 12
  check_weights:
    security:  0.30    # hard-block — le plus critique
    execution: 0.28    # doit s'exécuter sans crash
    syntax:    0.18    # ESM valide
    output:    0.14    # contrat {success:bool}
    structure: 0.10    # export async function run()
  tier_thresholds:
    gold:      0.85    # déployé immédiatement
    silver:    0.65    # déployé + review_flag
    bronze:    0.40    # déployé + needs_review
    quarantine: 0.0   # skills/_quarantine/
  quarantine_dir: "skills/_quarantine"

# ─── Swarm Router — Bee Specialization (Phase 16) ────────────────────────────
swarm:
  bees:
    - { name: UIAgent,     emoji: "🎨", domain: ui }
    - { name: FileAgent,   emoji: "📁", domain: file }
    - { name: CodeAgent,   emoji: "💻", domain: code }
    - { name: WebAgent,    emoji: "🌐", domain: web }
    - { name: SystemAgent, emoji: "🖥️",  domain: system }
  min_confidence: 0.10      # Score minimum pour dispatch spécialisé
  fallback_domain: code     # Domaine par défaut si aucun score suffisant

# ─── Consciousness Bridge (Phase 19) ─────────────────────────────────────────
consciousness:
  bridge_url: "http://localhost:8016"
  health_poll_interval_s: 30          # Poll santé des 15 couches toutes les 30s
  signal_poll_ms: 500                 # Lecture signals.jsonl toutes les 500ms
  max_events_buffer: 500              # Événements NeuralEventBus en mémoire
  max_signals_buffer: 200             # Signaux phéromone en mémoire
  websocket_ping_interval_s: 10       # Ping clients WS

# ─── Computer Use (Phase 18) ─────────────────────────────────────────────────
computer_use:
  max_steps_default: 20
  max_steps_limit: 40
  wait_cap_ms: 5000
  vision_model: "moondream:latest"    # Modèle vision pour screenshot+describe
  failsafe: true                      # pyautogui FAILSAFE coin haut-gauche

# ─── Self-Optimization Engine (Phase 21) ─────────────────────────────────────
optimizer:
  loop_interval_s: 1800              # Cycle toutes les 30 minutes
  top_gaps: 5                        # Nombre de gaps traités par cycle
  gap_min_score: 1.5                 # Seuil minimum gap_score pour action
  deploy_tiers: [gold, silver]       # Tiers auto-déployés après validation
  startup_delay_s: 60               # Délai avant le premier cycle

# ─── Production Shell (Phase 20) ─────────────────────────────────────────────
production:
  pm2_ecosystem: "ecosystem.config.js"
  docker_compose: "docker-compose.yml"
  health_check_script: "scripts/health_check.sh"
  log_dir: "agent/logs"
  test_command_pytest: "python3 -m pytest tests/pytest/ -v --tb=short"
  test_command_jest: "node --experimental-vm-modules node_modules/.bin/jest"
  start_command: "python3 start_agent.py"
  total_python_layers: 17             # Phases 1-21 complètes
